# --- 视频输出 ---
# 使用 gpu-next 是目前推荐的现代渲染路径, 支持更多特性
# 如果遇到问题, 可以改回 vo=gpu
vo=gpu-next

# 强制使用 Wayland 上下文 (通常会自动检测, 但显式指定更稳)
gpu-context=wayland

# --- 硬件解码 ---
# 自动开启最佳的硬件解码策略
hwdec=auto-safe

# --- 窗口行为 ---
# 循环单个文件
# loop-file=inf

# 循环播放列表
loop-playlist=inf

# --- 截图设置 ---
screenshot-directory=~/Downloads
screenshot-format=png
# screenshot-png-compression=7
